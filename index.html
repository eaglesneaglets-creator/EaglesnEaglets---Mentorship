<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <title>Eagles &amp; Eaglets — Mentorship that earns its wings</title>
    <meta name="description" content="Eagles &amp; Eaglets is a mentorship and capacity-building platform where Eagles guide Eaglets through structured programs, content, and community." />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Eagles &amp; Eaglets" />
    <meta property="og:title" content="Eagles &amp; Eaglets — Mentorship that earns its wings" />
    <meta property="og:description" content="A mentorship platform where Eagles guide Eaglets through structured programs, content, and community." />
    <!-- og:image: temporary use of /logo.jpeg until Plan 22-01 ships a dedicated
         1200x630 asset (public/og-default.jpg). -->
    <meta property="og:image" content="/logo.jpeg" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eagles &amp; Eaglets — Mentorship that earns its wings" />
    <meta name="twitter:description" content="A mentorship platform where Eagles guide Eaglets through structured programs, content, and community." />
    <meta name="twitter:image" content="/logo.jpeg" />

    <!-- og:url + canonical are deferred to Plan 22-01 (PageHead component)
         where they will be set per-route from VITE_PUBLIC_URL + pathname.
         Hardcoding here would mislabel every route as the homepage. -->
    <!-- Google Fonts: Inter (Modern Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Material Symbols (Icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <style>
      /* Material Symbols default settings */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined.fill {
        font-variation-settings: 'FILL' 1;
      }
    </style>
    <!-- Preconnect to Paystack CDN to reduce payment widget load latency -->
    <link rel="preconnect" href="https://js.paystack.co">
    <link rel="dns-prefetch" href="https://js.paystack.co">
    <!-- Preconnect to API origin — shaves the TLS+DNS handshake off the first
         auth request (register/login submit). -->
    <link rel="preconnect" href="https://eaglesneaglet-backend-production.up.railway.app" crossorigin>
    <link rel="dns-prefetch" href="https://eaglesneaglet-backend-production.up.railway.app">
    <!-- Paystack Inline JS — loaded from CDN, exposes window.PaystackPop -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
