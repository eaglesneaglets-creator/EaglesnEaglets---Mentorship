# HTTP-level directives (included from conf.d inside nginx http{} block).
# Loaded before default.conf via the 00- prefix.

# Strip OAuth codes, tokens, and other secrets from access logs.
map $request_uri $redacted_uri {
    default $request_uri;
    ~^(/auth/[^?]*)\?.*                              $1?[REDACTED];
    ~^(/reset-password[^?]*)\?.*                      $1?[REDACTED];
    ~^(/verify-email[^?]*)\?.*                        $1?[REDACTED];
    ~^(/email-change/confirm[^?]*)\?.*                $1?[REDACTED];
    ~^(/admin/invite/accept[^?]*)\?.*                $1?[REDACTED];
}

log_format redacted '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $redacted_uri $server_protocol" '
                    '$status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for"';
