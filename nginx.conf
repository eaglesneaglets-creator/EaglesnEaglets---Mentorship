# =============================================================================
# Nginx Configuration for Eagles & Eaglets Frontend
# =============================================================================
# This configures Nginx to serve our React application.
# Key features:
#   - Serves static files efficiently
#   - Handles client-side routing (SPA)
#   - Blocks common scanner paths before SPA fallback
#   - Redacts sensitive query strings in access logs (see nginx-http.conf)
#   - Security headers
#   - Gzip compression
# =============================================================================

server {
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # OAuth codes / reset tokens must not appear in Railway logs.
    access_log /var/log/nginx/access.log redacted;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "MSIE [1-6]\.";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check — no access log noise
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Dotfiles and hidden paths (.env, .git, .aws, …)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Automated vulnerability scans — 404 immediately, no SPA shell, no logging.
    location ~* \.(php|ini|bak|sql|env|yaml|yml|log|swp|old|save|dist|orig|tmp|backup|pem|key|crt)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    location ~* (^|/)(wp-config|wp-content|wp-includes|wp-json|phpinfo|webmin|phpmyadmin|credentials|serverless|amplify)(/|$|\.|\?) {
        return 404;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(config\.php|test\.php|config\.json|vercel\.json|netlify\.toml|aws-config\.js|aws\.config\.js)(/|$|\?) {
        return 404;
        access_log off;
        log_not_found off;
    }

    # Hashed static assets — long cache, no access log
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
